<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCyber Labs</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            height: 95vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px;
        }

        .terminal {
            width: 100%;
            box-sizing: border-box;
        }

        .command, .response, .prompt span, .prompt input {
            color: #00ff00;
        }

        .command {
            margin: 0;
        }

        a {
            color: #00ff00;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .prompt {
            margin: 20px 0 0;
            display: flex;
            align-items: center;
        }

        .prompt input {
            background: none;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            flex: 1;
            outline: none;
        }

        .terminal-body {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        ul {
	    list-style-type: none;
	    padding-left: 20; /* Optional: remove default padding */
	    margin: 0; /* Optional: remove default margin */
	}

	li {
	    list-style-type: none; /* This can also be applied directly to <li> */
	}

    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-body" id="terminalBody">
            <p class="command">Welcome to CyberCyber Labs</p>
            <p class="command">Your Friendly Neighborhood Cyber Experts</p>
            <p class="command">Here to Demystify Digital Security for You.</p>
            <p class="command"><br/>Contact us: <a href="mailto:contact@cybercyberlabs.com">contact@cybercyberlabs.com</a></p>
        </div>
        <div class="prompt">
            <span>user@cybercyberlabs.com:~$</span>
            <input type="text" id="userInput" autofocus onkeydown="if(event.key === 'Enter') handleCommand()">
        </div>
    </div>

    <script>
        function xorEncryptDecrypt(input, key) {
    let output = '';
    for (let i = 0; i < input.length; i++) {
        output += String.fromCharCode(input.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return output;
}

function base64Encode(input) {
    return btoa(input);
}

function base64Decode(input) {
    return atob(input);
}

function handleCommand() {
    const input = document.getElementById('userInput').value.trim();
    const terminalBody = document.getElementById('terminalBody');

    const commands = {
        "about": "We are a team of dedicated cybersecurity professionals with a passion for protecting your digital world.",
        "contact": 'Contact us at <a href="mailto:contact@cybercyberlabs.com">contact@cybercyberlabs.com</a>',
        "help": 'Available commands:<ul><li>about: <ul><li>Information about us</li></ul><li>contact: <ul><li>How to get in touch</li></ul><li>help: <ul><li>Display this help message</li></ul>',
        "podcast": 'Check out our podcast at <a href="https://cybercyber.co.il/" target="_blank">this link</a>.'
    };

    const key = "cybercyberlabs :heart: burekas";

    const encryptedHackCommand = 'CxgBDg==';
    const encryptedHackResponse = 'OhYXQgAGWQNFERkTCxxVSUgKDxdYGkEQEBxCH0EKDAxdRTEMFxYEERhBFwAAUw5FGB0BGkYHEB5FEg4GRAsHRQcTWRYKUgUVTA==';

    const decodedHackCommand = xorEncryptDecrypt(base64Decode(encryptedHackCommand), key);
    const decodedHackResponse = xorEncryptDecrypt(base64Decode(encryptedHackResponse), key);

    if (input) {
        const newCommand = document.createElement('p');
        newCommand.className = 'command';
        newCommand.textContent = `user@cyberconsulting:~$ ${input}`;
        terminalBody.appendChild(newCommand);

        const newResponse = document.createElement('p');
        newResponse.className = 'response';

        if (commands[input.toLowerCase()]) {
            newResponse.innerHTML = commands[input.toLowerCase()];
        } else if (input.toLowerCase() === decodedHackCommand) {
            newResponse.innerHTML = decodedHackResponse;
        } else {
            newResponse.innerHTML = 'Command not recognized. For inquiries, please contact us at <a href="mailto:contact@cybercyberlabs.com">contact@cybercyberlabs.com</a>';
        }

        terminalBody.appendChild(newResponse);
        terminalBody.scrollTop = terminalBody.scrollHeight;
    }

    document.getElementById('userInput').value = '';
}



    </script>
</body>
</html>
